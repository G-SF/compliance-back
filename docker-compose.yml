# docker-compose.yml
#
# Three services on a shared private network:
#   api      → the Node.js backend
#   mongo    → MongoDB 7
#   redis    → Redis 7 (append-only persistence enabled)
#
# Usage:
#   Start:    docker-compose up --build
#   Stop:     docker-compose down
#   Wipe DB:  docker-compose down -v

version: '3.9'

services:
  # ── LLM (Ollama) ─────────────────────────────────────────────────────────────
  llm:
    image: ollama/ollama:latest
    container_name: backend_llm
    restart: unless-stopped
    # Override entrypoint to start server + pull model on first boot.
    # The model is cached in the named volume so subsequent restarts skip the pull.
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "[llm] Waiting for Ollama to start..."
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo "[llm] Pulling model: ${LLM_MODEL:-mistral}"
        ollama pull ${LLM_MODEL:-mistral}
        echo "[llm] Model ready. Server running."
        wait $$OLLAMA_PID
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # Reports healthy once the model appears in the list
      test: ['CMD-SHELL', 'ollama list 2>/dev/null | grep -qE "mistral|llama"']
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s
    networks:
      - backend

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: backend_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Use service names as hostnames inside the Docker network
      MONGO_URI: mongodb://mongo:27017/backend_api
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm:11434}
      LLM_MODEL: ${LLM_MODEL:-mistral}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm:
        condition: service_started
    networks:
      - backend

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: backend_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Porta mapeada ao host para permitir `npm run dev` local
    # 27018 evita conflito com outros containers Mongo já rodando no host
    ports:
      - '27018:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: backend_redis
    restart: unless-stopped
    # Enable append-only file persistence so tokens survive container restarts
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # Porta mapeada ao host para permitir `npm run dev` local
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

# ── Named volumes (data persists across container restarts) ──────────────────
volumes:
  mongo_data:
  redis_data:
  ollama_data:

# ── Isolated network (services can't be reached from outside without port mapping) ─
networks:
  backend:
    driver: bridge

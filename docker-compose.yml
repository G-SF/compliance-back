services:
  # -- API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: backend_api
    restart: unless-stopped

    ports:
      - '3000:3000'

    environment:
      NODE_ENV: production
      PORT: 3000

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      MONGO_URI: mongodb://mongo:27017/backend_api

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Claude AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-4096}

      # Custos — cotação USD→BRL (atualize conforme mercado)
      USD_BRL_RATE: ${USD_BRL_RATE:-5.90}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/api/v1/auth/google/callback}

      # Email — Resend
      SMTP_HOST: ${SMTP_HOST:-smtp.resend.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-resend}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Contracta <onboarding@resend.dev>}

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - backend

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: backend_mongo
    restart: unless-stopped

    volumes:
      - mongo_data:/data/db

    ports:
      - '27018:27017'

    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - backend

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: backend_redis
    restart: unless-stopped

    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}

    volumes:
      - redis_data:/data

    ports:
      - '6379:6379'

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

volumes:
  mongo_data:
  redis_data:

networks:
  backend:
    driver: bridge
